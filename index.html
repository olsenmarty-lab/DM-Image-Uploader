<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM Image Uploader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f7f7f5;--card:#fff;--bdr:#e4e3de;--tx:#1c1c1a;--tx2:#6e6d68;--tx3:#a3a29c;
    --ac:#2d5be3;--ac-s:#e8edfb;--ac-h:#1d44b8;
    --r:10px;--rs:7px;--rx:5px;
    --f:'DM Sans',system-ui,sans-serif;
  }

  body{
    font-family:var(--f);
    background:transparent;
    color:var(--tx);
    margin:0;
    padding:0;
    overflow: visible; /* Allows Jotform to detect size changes */
  }

  /* ---- DROPZONE (Small Button State) ---- */
  .dz{
    border:2px dashed var(--bdr);
    border-radius:var(--r);
    padding:20px;
    text-align:center;
    cursor:pointer;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height: 140px; /* Standard button height */
    transition: all 0.2s ease;
  }
  .dz:hover,.dz.over{border-color:var(--ac);background:var(--ac-s)}
  .dz-ico svg{width:32px;height:32px;stroke:var(--ac);fill:none;stroke-width:1.8;margin-bottom:8px}
  .dz h3{font-size:14px;font-weight:600;color:var(--tx2)}
  .dz input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;}

  /* ---- EDITOR (Large State) ---- */
  .ed{display:none; padding:10px; background:#fff; border-radius:var(--r); border:1px solid var(--bdr);}
  .ed.on{display:block}
  .crop-wrap{position:relative;width:100%;border-radius:var(--rs);overflow:hidden;background:#0e0e0e;}
  .crop-wrap img.cs{display:block;max-width:100%;max-height:420px}
  
  .ov-lay{position:absolute;pointer-events:none;z-index:100;display:none;overflow:hidden;}
  .ov-lay.on{display:block}
  .ov-lay img{width:100%;height:100%;display:block}
  
  .crop-info{display:flex;align-items:center;justify-content:space-between;padding:10px 0;font-size:11px;color:var(--tx3);}
  .dims{background:var(--bg);padding:3px 8px;border-radius:var(--rx);font-weight:700;color:var(--ac);}
  
  .ed-bar{display:flex;justify-content:flex-end;gap:10px;padding-top:10px;border-top:1px solid var(--bdr)}
  .btn{padding:10px 20px;border-radius:var(--rs);border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--f);transition:0.2s;}
  .btn-p{background:var(--ac);color:#fff}
  .btn-p:hover{background:var(--ac-h)}
  .btn-o{background:var(--card);color:var(--tx2);border:1px solid var(--bdr)}

  /* ---- DONE STATE ---- */
  .done{display:none}.done.on{display:block}
  .done-card{display:flex;gap:15px;align-items:center;background:#e4f5ec;border:1px solid #b4dfc8;border-radius:var(--rs);padding:15px;}
  .done-thumb{width:50px;height:50px;border-radius:var(--rx);object-fit:cover;border:2px solid #fff;}
  .done-info{flex:1;min-width:0}
  .done-fn{font-size:14px;font-weight:700;color:#1a8756;}
  .done-rm{padding:6px 12px;border-radius:var(--rx);border:1px solid #b4dfc8;background:#fff;color:#1a8756;font-size:11px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

  <div class="dz" id="dz">
    <div class="dz-ico">
      <svg viewBox="0 0 24 24"><path d="M12 16V4m0 0L7 9m5-5l5 5" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h3>Upload Image for Render</h3>
    <input type="file" id="fi" accept="image/jpeg,image/png,image/webp">
  </div>

  <div class="ed" id="ed">
    <div class="crop-wrap" id="cWrap">
      <img class="cs" id="cImg" src="" alt="">
      <div class="ov-lay" id="ovL"><img id="ovLI" src="" alt=""></div>
    </div>
    <div class="crop-info">
      <span>Adjust crop to fit render area</span>
      <span class="dims" id="cDim"></span>
    </div>
    <div class="ed-bar">
      <button class="btn btn-o" onclick="doCancel()">Cancel</button>
      <button class="btn btn-p" id="uBtn" onclick="doUpload()">Crop &amp; Done</button>
    </div>
  </div>

  <div class="done" id="doneP">
    <div class="done-card">
      <img class="done-thumb" id="dTh" src="" alt="">
      <div class="done-info">
        <div class="done-fn">Upload Successful</div>
        <div style="font-size:11px; color:#1a8756; font-weight:500;">Formatted for Nexrender (PNG)</div>
      </div>
      <button class="done-rm" onclick="doRemove()">Change Image</button>
    </div>
  </div>

<script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
(function(){
'use strict';

// --- YOUR CONFIG ---
var cloudName = 'douyogs5j';
var uploadPreset = 'DM Image Upload Preset'; 

var cfg = { overlayUrl: '', outputWidth: 1920, outputHeight: 1080 };
var cropper = null;
var resultFilename = null;
var $ = function(id){ return document.getElementById(id); };

// --- JOTFORM READY ---
JFCustomWidget.subscribe('ready', function() {
  var ow = JFCustomWidget.getWidgetSetting('overlayUrl');
  var w  = JFCustomWidget.getWidgetSetting('outputWidth');
  var h  = JFCustomWidget.getWidgetSetting('outputHeight');

  if (ow) { cfg.overlayUrl = ow.trim(); $('ovLI').src = cfg.overlayUrl; }
  cfg.outputWidth  = parseInt(w) || 1920;
  cfg.outputHeight = parseInt(h) || 1080;

  // Initial small size
  JFCustomWidget.requestFrameResize({ height: 150 });
});

// --- CLOUDINARY UPLOAD ---
window.doUpload = function() {
  if (!cropper) return;

  var canvas = cropper.getCroppedCanvas({
    width: cfg.outputWidth,
    height: cfg.outputHeight,
    imageSmoothingQuality: 'high'
  });

  canvas.toBlob(function(blob) {
    var formData = new FormData();
    formData.append('file', blob);
    formData.append('upload_preset', uploadPreset);
    
    // Generate unique ID for Nexrender
    var uniqueID = 'render_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
    formData.append('public_id', uniqueID);

    $('uBtn').textContent = 'Uploading...';
    $('uBtn').disabled = true;

    fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
      method: 'POST', body: formData
    })
    .then(res => res.json())
    .then(data => {
      // Create Nexrender-friendly URL (Force PNG and Download)
      var finalUrl = data.secure_url.replace('/upload/', '/upload/f_png,fl_attachment/');
      
      resultFilename = finalUrl;
      JFCustomWidget.sendData({ value: finalUrl });

      $('dTh').src = data.secure_url;
      setState('done');
      JFCustomWidget.requestFrameResize({ height: 150 }); // Snap back
    })
    .catch(err => {
      alert('Upload failed.');
      $('uBtn').textContent = 'Crop & Done';
      $('uBtn').disabled = false;
    });
  }, 'image/png');
};

function openEditor(f) {
  var reader = new FileReader();
  reader.onload = function(e) {
    $('cImg').src = e.target.result;
    setState('ed');
    
    // PUSH OPEN FOR CROPPER
    setTimeout(function() {
      JFCustomWidget.requestFrameResize({ height: 720 });
    }, 50);

    if (cropper) cropper.destroy();
    cropper = new Cropper($('cImg'), {
      aspectRatio: cfg.outputWidth / cfg.outputHeight,
      viewMode: 1,
      dragMode: 'move',
      crop: function() { positionOverlay(); },
      ready: function() { 
        $('cDim').textContent = cfg.outputWidth + '×' + cfg.outputHeight + 'px';
        if (cfg.overlayUrl) { positionOverlay(); $('ovL').classList.add('on'); }
      }
    });
  };
  reader.readAsDataURL(f);
}

function positionOverlay() {
  if (!cropper || !cfg.overlayUrl) return;
  var box = cropper.getCropBoxData();
  var el = $('ovL');
  el.style.left = box.left + 'px'; el.style.top = box.top + 'px';
  el.style.width = box.width + 'px'; el.style.height = box.height + 'px';
}

function setState(s) {
  $('dz').style.display = s === 'dz' ? 'flex' : 'none';
  $('ed').classList.toggle('on', s === 'ed');
  $('doneP').classList.toggle('on', s === 'done');
}

var fi = $('fi');
fi.addEventListener('change', function(e){ if(e.target.files.length) openEditor(e.target.files[0]); });
window.doCancel = function() { setState('dz'); JFCustomWidget.requestFrameResize({ height: 150 }); };
window.doRemove = function() { setState('dz'); JFCustomWidget.requestFrameResize({ height: 150 }); JFCustomWidget.sendData({ value: '' }); };

})();
</script>
</body>
</html>
